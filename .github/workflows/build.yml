name: Build macOS DMG
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Build
        run: |
          cd TikTokReplier
          xcodebuild \
            -project TikTokReplier.xcodeproj \
            -scheme TikTokReplier \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean build
      - name: Ad-hoc sign
        run: |
          cd TikTokReplier
          APP=$(find build -name "TikTokReplier.app" -type d | head -1)
          codesign --force --deep --sign - "$APP"
      - name: Create DMG
        run: |
          cd TikTokReplier
          APP=$(find build -name "TikTokReplier.app" -type d | head -1)
          mkdir dmg_staging
          cp -R "$APP" dmg_staging/
          ln -s /Applications dmg_staging/Applications
          cat > dmg_staging/README.txt << 'EOF'
First launch: right-click TikTokReplier.app → Open → click Open
This bypasses the "unidentified developer" warning (only needed once).
EOF
          hdiutil create -volname TikTokReplier -srcfolder dmg_staging -ov -format UDZO TikTokReplier.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: TikTokReplier-dmg
          path: TikTokReplier/TikTokReplier.dmg
          retention-days: 30
